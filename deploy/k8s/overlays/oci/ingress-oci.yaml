apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rag-ingress
spec:
  ingressClassName: nginx
  rules:
    - host: rag.oci.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
