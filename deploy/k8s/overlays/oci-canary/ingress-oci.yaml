apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rag-ingress
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - rag.oci.example.com
      secretName: rag-tls
  rules:
    - host: rag.oci.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
