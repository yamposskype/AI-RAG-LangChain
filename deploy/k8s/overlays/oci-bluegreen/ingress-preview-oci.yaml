apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rag-ingress-preview
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - preview.rag.oci.example.com
      secretName: rag-preview-tls
  rules:
    - host: preview.rag.oci.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-preview
                port:
                  number: 80
