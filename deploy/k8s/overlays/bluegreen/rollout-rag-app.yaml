apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: rag-app
spec:
  replicas: 1
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: rag-app
  strategy:
    blueGreen:
      activeService: rag-app
      previewService: rag-app-preview
      autoPromotionEnabled: false
      previewReplicaCount: 1
      scaleDownDelaySeconds: 30
  template:
    metadata:
      labels:
        app: rag-app
        app.kubernetes.io/name: rag-app
        app.kubernetes.io/component: rag-api
    spec:
      terminationGracePeriodSeconds: 45
      initContainers:
        - name: init-rag-storage
          image: busybox:1.36
          command: ["sh", "-c", "mkdir -p /data/chroma_db /data/uploads /data/logs"]
          volumeMounts:
            - name: rag-app-data
              mountPath: /data
      containers:
        - name: rag-app
          image: ghcr.io/your-org/rag-app:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
              name: http
          env:
            - name: API_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: rag-config
                  key: API_BASE_URL
            - name: API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: rag-secrets
                  key: API_TOKEN
            - name: FLASK_ENV
              valueFrom:
                configMapKeyRef:
                  name: rag-config
                  key: FLASK_ENV
            - name: ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: rag-config
                  key: APP_ENVIRONMENT
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: rag-config
                  key: LOG_LEVEL
            - name: ENABLE_GATEWAY_AUTH
              valueFrom:
                configMapKeyRef:
                  name: rag-config
                  key: ENABLE_GATEWAY_AUTH
            - name: API_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: rag-secrets
                  key: API_GATEWAY_TOKEN
            - name: ENABLE_RATE_LIMIT
              valueFrom:
                configMapKeyRef:
                  name: rag-config
                  key: ENABLE_RATE_LIMIT
            - name: RATE_LIMIT_REQUESTS_PER_MINUTE
              valueFrom:
                configMapKeyRef:
                  name: rag-config
                  key: RATE_LIMIT_REQUESTS_PER_MINUTE
            - name: MAX_QUERY_CHARS
              valueFrom:
                configMapKeyRef:
                  name: rag-config
                  key: MAX_QUERY_CHARS
            - name: CORS_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: rag-config
                  key: CORS_ORIGINS
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: rag-secrets
                  key: SECRET_KEY
          startupProbe:
            httpGet:
              path: /livez
              port: http
            periodSeconds: 5
            failureThreshold: 24
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /livez
              port: http
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 5"]
          volumeMounts:
            - name: rag-app-data
              mountPath: /app/chroma_db
              subPath: chroma_db
            - name: rag-app-data
              mountPath: /app/uploads
              subPath: uploads
            - name: rag-app-data
              mountPath: /app/logs
              subPath: logs
          resources:
            requests:
              cpu: "500m"
              memory: "768Mi"
            limits:
              cpu: "2"
              memory: "3Gi"
      volumes:
        - name: rag-app-data
          persistentVolumeClaim:
            claimName: rag-app-data
