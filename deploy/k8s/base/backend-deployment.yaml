apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: rag-system
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/your-org/rag-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3456
          env:
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: rag-secrets
                  key: MONGO_URI
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: rag-config
                  key: BACKEND_PORT
          readinessProbe:
            tcpSocket:
              port: 3456
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 3456
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
