apiVersion: v1
kind: ConfigMap
metadata:
  name: rag-config
data:
  APP_ENVIRONMENT: "production"

  BACKEND_PORT: "3456"
  MONGO_DB: "rag_db"

  API_BASE_URL: "http://backend:3456"
  FLASK_ENV: "production"
  LOG_LEVEL: "INFO"

  ENABLE_GATEWAY_AUTH: "false"
  ENABLE_RATE_LIMIT: "true"
  RATE_LIMIT_REQUESTS_PER_MINUTE: "120"
  MAX_QUERY_CHARS: "4000"

  CORS_ORIGINS: "https://rag.example.com"

  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
