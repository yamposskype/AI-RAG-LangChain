apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: rag-system
spec:
  clusterIP: None
  selector:
    app: mongodb
  ports:
    - name: mongodb
      port: 27017
      targetPort: 27017
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: rag-system
spec:
  clusterIP: None
  selector:
    app: redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: rag-system
spec:
  selector:
    app: backend
  ports:
    - name: http
      port: 3456
      targetPort: 3456
---
apiVersion: v1
kind: Service
metadata:
  name: rag-app
  namespace: rag-system
spec:
  selector:
    app: rag-app
  ports:
    - name: http
      port: 5000
      targetPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: rag-system
spec:
  selector:
    app: frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
